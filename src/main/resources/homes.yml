max-homes: 16 # two rows
gui:
  # Layout:
  # 1: A Home slot
  # 0: Empty slot
  # i: Information item
  title: '<h2>Homes'
  layout:
    - '000000000'
    - '010101010'
    - '010101010'
    - '000000000'
    - '0000i0000'
  items:
    info:
      material: PLAYER_HEAD
      name: '<h2>Homes'
      lore:
        - ''
        - '<p>Hier kannst du deine Homes verwalten.'
        - '<p>Du kannst bis zu <hl><max-homes></hl> Homes setzen.'
        - ''
        - '<yellow>Tipp: <p>Das Limit kann mit einem Rang erhöht werden.'
    home:
      material: LIME_DYE
      name: '<h2><home>'
      lore:
        - ''
        - '<p>Position: <hl><x> <y> <z></hl>'
        - '<p>Welt: <hl><world></hl>'
        - ''
        - '<bl>Linksklick: <p>Teleportieren'
        - '<bl>Rechtsklick: <p>Home löschen'
        - ''
    home_delete_confirm:
      material: RED_DYE
      name: '<ex><home>'
      lore:
        - ''
        - '<p>Position: <hl><x> <y> <z></hl>'
        - '<p>Welt: <hl><world></hl>'
        - ''
        - '<ex>⚠ Klicke erneut zum Löschen!'
        - '<bl>Linksklick: <p>Abbrechen'
        - ''
    # No location defined – slot is unlocked but empty
    home_undefined:
      material: GRAY_DYE
      name: '<p>Leer'
      lore:
        - ''
        - '<p>Hier ist noch kein Home gesetzt.'
        - ''
    # Player has not enough capacity to allow more homes
    home_locked:
      material: BARRIER
      name: '<ex>Gesperrt'
      lore:
        - ''
        - '<p>Du hast nicht genug Kapazität.'
        - '<p>Erhöhe dein Rang, um mehr Homes zu setzen.'
        - ''
